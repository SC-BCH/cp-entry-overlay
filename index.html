<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Channel Point Entry Overlay</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800;900&family=Oswald:wght@700&display=swap");

    html {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      overflow: hidden !important;
      background: transparent !important;
      background-color: transparent !important;
    }

    body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      overflow: hidden !important;
      background: transparent !important;
      background-color: transparent !important;
      font-family: "M PLUS Rounded 1c", "Yu Gothic UI", "Meiryo", sans-serif;
    }

    :root {
      --panel-bg-1: rgba(255, 238, 245, 0.96);
      --panel-bg-2: rgba(255, 211, 228, 0.93);
      --panel-border: rgba(255, 124, 188, 0.92);
      --text-main: #65364d;
      --text-sub: #f05f9f;
      --ribbon: rgba(215, 68, 134, 0.82);
      --white-glow: rgba(255, 255, 255, 0.95);
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      background: transparent !important;
      background-color: transparent !important;
    }

    .entry {
      position: relative;
      width: min(1500px, 94vw);
      height: min(480px, 52vh);
      border-radius: 34px;
      border: 4px solid var(--panel-border);
      overflow: hidden;
      background:
        radial-gradient(circle at 83% 48%, rgba(255,255,255,0.96) 0%, rgba(255,255,255,0.70) 18%, rgba(255,236,244,0.30) 39%, rgba(255,224,236,0.00) 63%),
        linear-gradient(101deg, var(--panel-bg-1) 0%, var(--panel-bg-2) 100%);
      box-shadow:
        0 18px 48px rgba(0,0,0,0.22),
        0 0 26px rgba(255,105,180,0.25);
      opacity: 0;
      transform: translateY(18px) scale(0.97) rotate(-1.8deg);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .entry.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1) rotate(-1.8deg);
    }

    .entry.is-hiding {
      opacity: 0;
      transform: translateY(-10px) scale(0.985) rotate(-1.8deg);
    }

    .entry::before {
      content: "";
      position: absolute;
      inset: -10%;
      z-index: 1;
      background:
        radial-gradient(ellipse at 37% 42%, rgba(255,105,180,0.14) 0%, rgba(255,105,180,0.08) 28%, transparent 55%),
        repeating-conic-gradient(from 18deg at 41% 46%, rgba(230, 85, 150, 0.10) 0deg 8deg, transparent 9deg 24deg);
      opacity: 0.42;
      transform: scale(1.12);
    }

    .entry::after {
      content: "";
      position: absolute;
      z-index: 2;
      left: -4%;
      right: -4%;
      bottom: 17.5%;
      height: 78px;
      background: var(--ribbon);
      transform: rotate(-2.8deg);
      box-shadow: 0 8px 22px rgba(137, 42, 91, 0.18);
    }

    .avatar-glow {
      position: absolute;
      z-index: 3;
      right: 4.8%;
      top: 50%;
      width: clamp(330px, 27vw, 460px);
      height: clamp(330px, 27vw, 460px);
      transform: translateY(-50%) rotate(1.8deg);
      border-radius: 9999px;
      background:
        repeating-conic-gradient(
          from -8deg,
          rgba(255,255,255,0.94) 0deg,
          rgba(255,255,255,0.94) 5deg,
          rgba(255,255,255,0.06) 6deg,
          rgba(255,255,255,0.00) 14deg
        );
      opacity: 0.82;
    }

    .avatar-glow::after {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: 9999px;
      background:
        radial-gradient(circle, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.78) 42%, rgba(255,255,255,0.15) 66%, rgba(255,255,255,0) 76%);
    }

    .avatar-panel {
      position: absolute;
      z-index: 5;
      right: 8.5%;
      top: 50%;
      width: clamp(230px, 21vw, 350px);
      height: clamp(230px, 21vw, 350px);
      transform: translateY(-50%) rotate(1.8deg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-frame {
      position: relative;
      width: 86%;
      height: 86%;
      border-radius: 9999px;
      overflow: hidden;
      border: 5px solid rgba(255, 255, 255, 0.94);
      background: rgba(255, 255, 255, 0.72);
      box-shadow:
        0 0 22px rgba(255, 255, 255, 0.95),
        0 0 38px rgba(255, 255, 255, 0.66),
        0 10px 22px rgba(75, 27, 48, 0.18);
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .avatar-panel.has-icon .avatar-img {
      display: block;
    }

    .avatar-fallback {
      width: 100%;
      height: 100%;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(78px, 8vw, 132px);
      font-weight: 900;
      color: rgba(101, 54, 77, 0.72);
      text-shadow: 0 2px 14px rgba(255,255,255,0.84);
    }

    .avatar-panel.has-icon .avatar-fallback {
      display: none;
    }

    .text-area {
      position: absolute;
      z-index: 20;
      left: 10.5%;
      top: 11.0%;
      width: 58%;
      transform: rotate(1.6deg) skewX(-4deg);
    }

    .eyebrow {
      font-family: "Oswald", "Arial Black", "Segoe UI", sans-serif;
      font-size: clamp(28px, 2.7vw, 48px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.13em;
      color: var(--text-sub);
      text-shadow:
        0 2px 10px rgba(255,255,255,0.86),
        0 0 2px rgba(240,95,159,0.40);
      margin-bottom: 16px;
      white-space: nowrap;
    }

    .message-stack {
      color: var(--text-main);
      text-shadow:
        -3px -3px 0 rgba(255,255,255,0.88),
        3px -3px 0 rgba(255,255,255,0.88),
        -3px 3px 0 rgba(255,255,255,0.88),
        3px 3px 0 rgba(255,255,255,0.88),
        0 8px 20px rgba(93, 42, 66, 0.22);
      letter-spacing: -0.055em;
      max-width: 100%;
    }

    .message-name {
      display: block;
      font-size: clamp(46px, 5.2vw, 86px);
      line-height: 0.98;
      font-weight: 900;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .message-action {
      display: block;
      margin-top: 4px;
      font-size: clamp(62px, 7.0vw, 116px);
      line-height: 0.95;
      font-weight: 900;
      white-space: nowrap;
    }

    .ribbon-text {
      position: absolute;
      z-index: 21;
      left: 9.8%;
      bottom: 13.4%;
      transform: rotate(-0.8deg) skewX(-6deg);
      color: #ffffff;
      font-family: "Oswald", "Arial Black", "Segoe UI", sans-serif;
      font-size: clamp(30px, 3.3vw, 56px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.055em;
      text-shadow:
        0 2px 10px rgba(84, 21, 51, 0.38),
        0 0 2px rgba(255,255,255,0.26);
      white-space: nowrap;
    }

    .debug-panel {
      position: fixed;
      left: 8px;
      bottom: 8px;
      z-index: 100;
      max-width: 62vw;
      padding: 8px 10px;
      border-radius: 8px;
      color: #ffffff;
      background: rgba(0,0,0,0.62);
      font: 12px Consolas, monospace;
      white-space: pre-wrap;
      display: none;
    }

    .debug-panel.is-visible {
      display: block;
    }

    @media (max-width: 1000px) {
      .entry {
        width: 96vw;
        height: 48vh;
      }

      .text-area {
        left: 7.2%;
        top: 10.0%;
        width: 59%;
      }

      .message-name {
        font-size: clamp(40px, 5.2vw, 70px);
      }

      .message-action {
        font-size: clamp(54px, 7.0vw, 96px);
      }

      .avatar-panel {
        right: 4.6%;
      }

      .avatar-glow {
        right: 1.6%;
      }

      .ribbon-text {
        left: 7.2%;
        bottom: 12.2%;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div id="entry" class="entry">
      <div class="avatar-glow"></div>

      <div class="text-area">
        <div class="eyebrow">MATCH ENTRY</div>
        <div class="message-stack">
          <span id="messageName" class="message-name"></span>
          <span id="messageAction" class="message-action">参戦！</span>
        </div>
      </div>

      <div class="ribbon-text">CHALLENGER APPROACHING</div>

      <div id="avatarPanel" class="avatar-panel">
        <div class="avatar-frame">
          <img id="icon" class="avatar-img" alt="icon">
          <div id="avatarFallback" class="avatar-fallback">参</div>
        </div>
      </div>
    </div>
    <div id="debugPanel" class="debug-panel"></div>
  </div>

  <script>
    "use strict";

    const OVERLAY_VERSION = "github_pages_round_split_message_lowered_20260503";
    const GAS_RAW_BASE_URL = "https://script.google.com/macros/s/AKfycbxJj5TWunfdCf_Vm7TR8Js50SY2JlsqpglEyPG3RAglYpAT-pHO4l-_SoGoj8t9n9Q_/exec";
    const REFRESH_MS = 1000;
    const DISPLAY_MS = 10000;
    const JSONP_TIMEOUT_MS = 8000;

    const params = new URLSearchParams(window.location.search);
    const isForceMode = params.get("force") === "1";
    const isTestMode = params.get("test") === "1";
    const isDebugMode = params.get("debug") === "1";
    const displayOverrideMs = parsePositiveInteger(params.get("displayMs"), DISPLAY_MS);

    const entryEl = document.getElementById("entry");
    const iconEl = document.getElementById("icon");
    const avatarPanelEl = document.getElementById("avatarPanel");
    const avatarFallbackEl = document.getElementById("avatarFallback");
    const messageNameEl = document.getElementById("messageName");
    const messageActionEl = document.getElementById("messageAction");
    const debugPanelEl = document.getElementById("debugPanel");

    let bootstrapDone = false;
    let currentEntry = null;
    let currentHideTimer = null;
    let currentNextTimer = null;
    let refreshBusy = false;

    const pendingQueue = [];
    const seenIdSet = new Set();
    const seenIdOrder = [];

    iconEl.addEventListener("load", function() {
      avatarPanelEl.classList.add("has-icon");
    });

    iconEl.addEventListener("error", function() {
      avatarPanelEl.classList.remove("has-icon");
      iconEl.removeAttribute("src");
    });

    function parsePositiveInteger(value, fallbackValue) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed) || parsed <= 0) {
        return fallbackValue;
      }
      return Math.floor(parsed);
    }

    function forceTransparentBackground() {
      try {
        document.documentElement.style.background = "transparent";
        document.documentElement.style.backgroundColor = "transparent";
        document.documentElement.style.setProperty("background", "transparent", "important");
        document.documentElement.style.setProperty("background-color", "transparent", "important");

        document.body.style.background = "transparent";
        document.body.style.backgroundColor = "transparent";
        document.body.style.setProperty("background", "transparent", "important");
        document.body.style.setProperty("background-color", "transparent", "important");
      } catch (error) {
        console.error(error);
      }
    }

    function setDebug(message) {
      if (!isDebugMode) {
        return;
      }
      debugPanelEl.classList.add("is-visible");
      debugPanelEl.textContent = String(message || "");
    }

    function buildRawUrl() {
      const rawParams = new URLSearchParams();
      rawParams.set("view", "entry_overlay");
      rawParams.set("raw", "1");
      rawParams.set("_", String(Date.now()));

      if (isForceMode) {
        rawParams.set("force", "1");
      }

      return GAS_RAW_BASE_URL + "?" + rawParams.toString();
    }

    function fetchJsonp(url) {
      return new Promise(function(resolve, reject) {
        const callbackName = "__cpEntryJsonp_" + Date.now() + "_" + Math.floor(Math.random() * 1000000);
        const separator = url.indexOf("?") >= 0 ? "&" : "?";
        const script = document.createElement("script");
        let settled = false;

        const timer = window.setTimeout(function() {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, JSONP_TIMEOUT_MS);

        function cleanup() {
          if (settled) {
            return;
          }
          settled = true;
          window.clearTimeout(timer);
          try {
            delete window[callbackName];
          } catch (error) {
            window[callbackName] = undefined;
          }
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = function(payload) {
          cleanup();
          resolve(payload);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("JSONP script load failed"));
        };

        script.src = url + separator + "callback=" + encodeURIComponent(callbackName);
        document.head.appendChild(script);
      });
    }

    function buildTestPayload() {
      const nowMs = Date.now();
      const displayName = params.get("name") || "maido4649";
      const iconUrl = params.get("icon") || "";

      return {
        ok: true,
        view: "entry_overlay",
        nowMs: nowMs,
        test: true,
        activeEntry: {
          updatedAt: new Date(nowMs).toISOString(),
          updatedAtMs: nowMs,
          redemptionId: "github-pages-test-" + nowMs,
          rewardId: "test",
          rewardTitle: "参加希望テスト",
          userId: "test-user",
          userLogin: "test_user",
          displayName: displayName,
          messageText: displayName + "さんが参戦！",
          iconUrl: iconUrl,
          profileImageUrl: iconUrl,
          rewardImageUrl: "",
          displayUntil: new Date(nowMs + displayOverrideMs).toISOString(),
          displayUntilMs: nowMs + displayOverrideMs,
          status: "TEST_ACTIVE",
          isActive: true
        },
        queueItems: []
      };
    }

    function addSeenId(redemptionId) {
      if (!redemptionId || seenIdSet.has(redemptionId)) {
        return;
      }

      seenIdSet.add(redemptionId);
      seenIdOrder.push(redemptionId);

      while (seenIdOrder.length > 500) {
        const removed = seenIdOrder.shift();
        seenIdSet.delete(removed);
      }
    }

    function isQueued(redemptionId) {
      return pendingQueue.some(function(item) {
        return item && item.redemptionId === redemptionId;
      });
    }

    function enqueueEntry(item) {
      if (!item || !item.redemptionId) {
        return;
      }
      if (seenIdSet.has(item.redemptionId)) {
        return;
      }
      if (currentEntry && currentEntry.redemptionId === item.redemptionId) {
        return;
      }
      if (isQueued(item.redemptionId)) {
        return;
      }
      pendingQueue.push(item);
    }

    function getDisplayName(item) {
      return item.displayName || item.userLogin || "";
    }

    function buildMessageParts(item) {
      const displayName = getDisplayName(item);
      const rawMessage = String(item.messageText || "").trim();

      if (displayName) {
        return {
          nameLine: displayName + "さんが",
          actionLine: "参戦！"
        };
      }

      if (rawMessage.indexOf("参戦") >= 0) {
        const before = rawMessage.replace(/参戦！?$/, "").trim();
        return {
          nameLine: before || "参加者さんが",
          actionLine: "参戦！"
        };
      }

      if (rawMessage) {
        return {
          nameLine: rawMessage,
          actionLine: "参戦！"
        };
      }

      return {
        nameLine: "参加者さんが",
        actionLine: "参戦！"
      };
    }

    function getIconUrl(item) {
      return item.iconUrl || item.profileImageUrl || item.rewardImageUrl || "";
    }

    function applyEntryToDom(item) {
      const displayName = getDisplayName(item);
      const messageParts = buildMessageParts(item);
      const iconUrl = getIconUrl(item);

      messageNameEl.textContent = messageParts.nameLine;
      messageActionEl.textContent = messageParts.actionLine;
      avatarFallbackEl.textContent = displayName ? displayName.charAt(0) : "参";

      avatarPanelEl.classList.remove("has-icon");
      iconEl.removeAttribute("src");

      if (iconUrl) {
        iconEl.src = iconUrl;
      }
    }

    function clearTimers() {
      if (currentHideTimer) {
        clearTimeout(currentHideTimer);
        currentHideTimer = null;
      }
      if (currentNextTimer) {
        clearTimeout(currentNextTimer);
        currentNextTimer = null;
      }
    }

    function hideEntry() {
      entryEl.classList.add("is-hiding");
      entryEl.classList.remove("is-visible");
    }

    function showNextFromQueue() {
      if (currentEntry) {
        return;
      }
      if (pendingQueue.length === 0) {
        return;
      }

      const nextItem = pendingQueue.shift();
      currentEntry = nextItem;
      addSeenId(nextItem.redemptionId);
      applyEntryToDom(nextItem);

      entryEl.classList.remove("is-hiding");
      void entryEl.offsetWidth;
      entryEl.classList.add("is-visible");

      clearTimers();

      currentHideTimer = window.setTimeout(function() {
        hideEntry();

        currentNextTimer = window.setTimeout(function() {
          currentEntry = null;
          currentHideTimer = null;
          currentNextTimer = null;
          showNextFromQueue();
        }, 280);
      }, displayOverrideMs);
    }

    function normalizeActiveEntry(activeEntry) {
      if (!activeEntry || !activeEntry.redemptionId) {
        return null;
      }

      return {
        redemptionId: activeEntry.redemptionId,
        rewardId: activeEntry.rewardId,
        rewardTitle: activeEntry.rewardTitle,
        userId: activeEntry.userId,
        userLogin: activeEntry.userLogin,
        displayName: activeEntry.displayName,
        messageText: activeEntry.messageText,
        iconUrl: activeEntry.iconUrl,
        profileImageUrl: activeEntry.profileImageUrl,
        rewardImageUrl: activeEntry.rewardImageUrl,
        receivedAt: activeEntry.updatedAt,
        receivedAtMs: activeEntry.updatedAtMs || 0
      };
    }

    function bootstrapQueue(data) {
      const activeEntry = data && data.activeEntry ? data.activeEntry : null;
      const queueItems = Array.isArray(data && data.queueItems) ? data.queueItems : [];

      queueItems.forEach(function(item) {
        if (!item || !item.redemptionId) {
          return;
        }
        if (activeEntry && activeEntry.isActive && item.redemptionId === activeEntry.redemptionId) {
          return;
        }
        addSeenId(item.redemptionId);
      });

      if (activeEntry && activeEntry.isActive && activeEntry.redemptionId) {
        const normalized = normalizeActiveEntry(activeEntry);
        if (normalized) {
          enqueueEntry(normalized);
          showNextFromQueue();
        }
      }

      bootstrapDone = true;
    }

    function mergeServerData(data) {
      if (!bootstrapDone) {
        bootstrapQueue(data);
        return;
      }

      const queueItems = Array.isArray(data && data.queueItems) ? data.queueItems : [];
      queueItems.forEach(function(item) {
        enqueueEntry(item);
      });

      const activeEntry = data && data.activeEntry ? data.activeEntry : null;
      if (activeEntry && activeEntry.isActive && activeEntry.redemptionId) {
        const normalized = normalizeActiveEntry(activeEntry);
        if (normalized) {
          enqueueEntry(normalized);
        }
      }

      showNextFromQueue();
    }

    async function refreshState() {
      if (refreshBusy) {
        window.setTimeout(refreshState, REFRESH_MS);
        return;
      }

      refreshBusy = true;

      try {
        forceTransparentBackground();

        const json = isTestMode
          ? buildTestPayload()
          : await fetchJsonp(buildRawUrl());

        if (isDebugMode) {
          const active = json && json.activeEntry ? json.activeEntry : {};
          setDebug([
            "version=" + OVERLAY_VERSION,
            "force=" + String(isForceMode),
            "test=" + String(isTestMode),
            "ok=" + String(json && json.ok),
            "displayName=" + String(active.displayName || ""),
            "isActive=" + String(active.isActive),
            "status=" + String(active.status || "")
          ].join("\n"));
        }

        mergeServerData(json);
      } catch (error) {
        console.error(error);
        setDebug("error=" + String(error && error.message ? error.message : error));
      } finally {
        refreshBusy = false;
        window.setTimeout(refreshState, REFRESH_MS);
      }
    }

    forceTransparentBackground();
    refreshState();
  </script>
</body>
</html>
